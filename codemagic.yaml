workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    scripts:
      - name: Set up Gradle
        script: |
          chmod +x ./gradlew

      - name: Build iOS framework
        script: |
          ./gradlew :composeApp:assemble

    artifacts:
      - composeApp/build/**/outputs/**/*.framework